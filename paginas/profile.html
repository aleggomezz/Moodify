<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Moodify | Perfil</title>

  <!-- SEO -->
  <meta name="description" content="Perfil del usuario en Moodify, estadísticas y preferencias musicales">
  <meta name="keywords" content="perfil, usuario, música, spotify, playlists">
  <meta name="author" content="Alejandro Gomez">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


  <!-- CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="logo" style="font-weight: 700; font-size: 22px;">Moodify 🎵</div>

    <div class="nav-links">
      <a href="/index.html">Inicio</a>
      <a href="/paginas/mood-selector.html">Moods</a>
      <a href="/paginas/playlist.html">Playlist</a>
      <a href="/paginas/profile.html">Perfil</a>
      <a href="/paginas/login.html">Pagina login</a>
    </div>
  </nav>

  <!-- HEADER -->
  <section class="hero small">

    <div class="hero-text">

      <p class="green-text">Tu perfil</p>

      <h1>Hola, Usuario 👋</h1>

      <p class="subtitle">
        Este es tu resumen de actividad musical en Moodify.
      </p>

    </div>

  </section>

  <!-- PROFILE CONTENT -->
  <section class="profile-section">

    <div class="profile-container">

      <!-- USER CARD -->
      <div class="profile-card card">

        <div class="avatar">🎧</div>

        <h2>Usuario Demo</h2>

        <p class="gray">usuario@email.com</p>

        <button class="btn-secondary full">
          Editar perfil
        </button>

      </div>

      <!-- STATS -->
      <div class="stats-grid">

        <div class="stat-card card">
          <h3>12</h3>
          <p>Playlists creadas</p>
        </div>

        <div class="stat-card card">
          <h3>48</h3>
          <p>Canciones escuchadas</p>
        </div>

        <div class="stat-card card">
          <h3>6</h3>
          <p>Moods usados</p>
        </div>

      </div>

      <!-- FAVORITES -->
      <div class="favorites card">

        <h2>🎵 Géneros favoritos</h2>

        <div class="tags">
          <span>Pop</span>
          <span>Indie</span>
          <span>Electronic</span>
          <span>Lo-fi</span>
        </div>

      </div>

      <!-- ACTION -->
      <div class="logout card">

        <h2>Cuenta</h2>

        <button class="btn-primary">
          Cerrar sesión
        </button>

      </div>

    </div>

  </section>

</body>
</html>
